ispring.application.name=dream11backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dream11?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Always run data.sql regardless of ddl-auto setting
spring.sql.init.mode=always

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationWhichShouldBeLongEnough
jwt.expiration=86400000

# Server Configuration
server.port=8080
