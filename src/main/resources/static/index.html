<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream11 Backend UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Top Navigation -->
    <header class="app-header">
        <div class="header-logo">
            <span class="logo-text">Dream11 Fan</span>
        </div>
        <div class="header-actions">
            <div class="wallet-icon"><i class="fa-solid fa-wallet"></i> <span>₹150</span></div>
            <div class="notification-icon"><i class="fa-regular fa-bell"></i></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content">
        <!-- Rendered dynamically via JS -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="app.navigate('home')">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="app.navigate('matches')">
            <i class="fa-solid fa-trophy"></i>
            <span>My Matches</span>
        </div>
        <div class="nav-item" onclick="app.navigate('rewards')">
            <i class="fa-solid fa-gift"></i>
            <span>Rewards</span>
        </div>
        <div class="nav-item" onclick="app.navigate('chat')">
            <i class="fa-regular fa-comment-dots"></i>
            <span>Chat</span>
        </div>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
